# TechVault production — host-level Nginx reverse proxy
#
# Install on EC2:
#   sudo cp /opt/techvault/devops/nginx/techvault.conf /etc/nginx/sites-available/techvault
#   sudo ln -sf /etc/nginx/sites-available/techvault /etc/nginx/sites-enabled/techvault
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name techvault.co.il www.techvault.co.il;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/techvault.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techvault.co.il/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Socket.IO / WebSocket ─────────────────────────────────────────────────
    location /socket.io {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Everything else → frontend container ──────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name techvault.co.il www.techvault.co.il;
    return 301 https://$host$request_uri;
}