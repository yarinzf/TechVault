# Copy to inventory.ini and replace placeholders with real values.
# inventory.ini is gitignored — never commit real IPs or key paths.
#
# When running via Jenkins, the pipeline generates inventory.ini automatically
# from Terraform output. Use this file only for manual runs.

[techvault]
REPLACE_WITH_SERVER_PUBLIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/YOUR_KEY_PAIR.pem

[techvault:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
