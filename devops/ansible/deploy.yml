---
# TechVault — Ansible deployment playbook
#
# Targets: Ubuntu 22.04 EC2 instance created by devops/terraform/
#
# Usage (manual):
#   ansible-playbook -i inventory.ini deploy.yml \
#     -e jwt_access_secret=SECRET1 \
#     -e jwt_refresh_secret=SECRET2 \
#     -e cookie_secret=SECRET3
#
# Usage (Jenkins):
#   Called automatically by the pipeline — secrets come from Jenkins credentials.

- name: Deploy TechVault
  hosts: techvault
  become: true

  vars:
    app_dir:     /opt/techvault
    repo_url:    "https://github.com/yarinzf/TechVault.git"
    repo_branch: main

  tasks:

    # ── System packages ───────────────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
        state: present

    # ── Docker Engine + Compose plugin ────────────────────────────────────────
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker Engine and Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker service
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    # ── Repository ────────────────────────────────────────────────────────────
    - name: Clone or pull TechVault repository
      git:
        repo:    "{{ repo_url }}"
        dest:    "{{ app_dir }}"
        version: "{{ repo_branch }}"
        force:   true
        update:  true

    - name: Set app directory ownership
      file:
        path:  "{{ app_dir }}"
        owner: ubuntu
        group: ubuntu
        recurse: true

    # ── Environment file ──────────────────────────────────────────────────────
    - name: Create .env.docker from example if not present
      copy:
        src:        "{{ app_dir }}/.env.docker.example"
        dest:       "{{ app_dir }}/.env.docker"
        remote_src: true
        force:      false   # never overwrite an existing file

    - name: Set JWT_ACCESS_SECRET
      lineinfile:
        path:   "{{ app_dir }}/.env.docker"
        regexp: '^JWT_ACCESS_SECRET='
        line:   "JWT_ACCESS_SECRET={{ jwt_access_secret }}"
      no_log: true
      when: jwt_access_secret is defined

    - name: Set JWT_REFRESH_SECRET
      lineinfile:
        path:   "{{ app_dir }}/.env.docker"
        regexp: '^JWT_REFRESH_SECRET='
        line:   "JWT_REFRESH_SECRET={{ jwt_refresh_secret }}"
      no_log: true
      when: jwt_refresh_secret is defined

    - name: Set COOKIE_SECRET
      lineinfile:
        path:   "{{ app_dir }}/.env.docker"
        regexp: '^COOKIE_SECRET='
        line:   "COOKIE_SECRET={{ cookie_secret }}"
      no_log: true
      when: cookie_secret is defined

    - name: Set ALLOWED_ORIGINS to server public IP
      lineinfile:
        path:   "{{ app_dir }}/.env.docker"
        regexp: '^ALLOWED_ORIGINS='
        line:   "ALLOWED_ORIGINS=http://{{ ansible_host }}:3000"

    - name: Set FRONTEND_URL to server public IP
      lineinfile:
        path:   "{{ app_dir }}/.env.docker"
        regexp: '^FRONTEND_URL='
        line:   "FRONTEND_URL=http://{{ ansible_host }}:3000"

    # ── Docker Compose stack ──────────────────────────────────────────────────
    - name: Build and start services
      command: docker compose up -d --build
      args:
        chdir: "{{ app_dir }}"
      become_user: ubuntu

    # ── Wait for backend to pass health check ─────────────────────────────────
    - name: Wait for backend health endpoint
      uri:
        url:         "http://localhost:5000/api/v1/health"
        status_code: 200
      register: health
      retries:  12
      delay:    10
      until:    health.status == 200

    # ── Product seeding ───────────────────────────────────────────────────────
    # All seed scripts are idempotent — safe to re-run; existing SKUs are skipped.
    - name: Seed categories and demo data
      command: docker compose exec -T backend npm run seed
      args:
        chdir: "{{ app_dir }}"
      become_user: ubuntu
      ignore_errors: true

    - name: Seed keyboards
      command: docker compose exec -T backend npm run seed:keyboards
      args:
        chdir: "{{ app_dir }}"
      become_user: ubuntu
      ignore_errors: true

    - name: Seed monitors
      command: docker compose exec -T backend npm run seed:monitors
      args:
        chdir: "{{ app_dir }}"
      become_user: ubuntu
      ignore_errors: true

    - name: Seed mice
      command: docker compose exec -T backend npm run seed:mice
      args:
        chdir: "{{ app_dir }}"
      become_user: ubuntu
      ignore_errors: true

    - name: Seed desktops
      command: docker compose exec -T backend npm run seed:desktops
      args:
        chdir: "{{ app_dir }}"
      become_user: ubuntu
      ignore_errors: true

    - name: Seed headphones
      command: docker compose exec -T backend npm run seed:headphones
      args:
        chdir: "{{ app_dir }}"
      become_user: ubuntu
      ignore_errors: true

    # ── Final validation ──────────────────────────────────────────────────────
    - name: Final health check
      uri:
        url:         "http://localhost:5000/api/v1/health"
        status_code: 200
      register: final_health

    - name: Print deployment summary
      debug:
        msg:
          - "========================================="
          - "  TechVault deployment complete!"
          - "========================================="
          - "  Frontend : http://{{ ansible_host }}:3000"
          - "  API      : http://{{ ansible_host }}:5000/api/v1"
          - "  API Docs : http://{{ ansible_host }}:5000/api-docs"
          - "  DB       : {{ final_health.json.data.db }}"
          - "  Uptime   : {{ final_health.json.data.uptime | int }}s"
          - "========================================="
