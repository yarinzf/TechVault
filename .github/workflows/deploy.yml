name: Deploy to Production

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  SSH_KEY_PATH: /home/runner/.ssh/deploy_key

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure SSH
        env:
          _HOST: ${{ secrets.EC2_HOST }}
          _USER: ${{ secrets.EC2_USER }}
          _KEY:  ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "HOME=$HOME"
          echo "SSH_KEY_PATH=$SSH_KEY_PATH"

          MISSING=0
          if [ -n "$_HOST" ]; then echo "EC2_HOST: present";    else echo "::error::EC2_HOST: MISSING";    MISSING=1; fi
          if [ -n "$_USER" ]; then echo "EC2_USER: present";    else echo "::error::EC2_USER: MISSING";    MISSING=1; fi
          if [ -n "$_KEY" ];  then echo "EC2_SSH_KEY: present"; else echo "::error::EC2_SSH_KEY: MISSING"; MISSING=1; fi
          if [ "$MISSING" -eq 1 ]; then echo "::error::One or more required secrets are missing"; exit 1; fi
          echo "Secret validation passed"

          echo "Creating SSH directory..."
          mkdir -p "$(dirname "$SSH_KEY_PATH")"
          echo "Directory ready: $(ls -ld "$(dirname "$SSH_KEY_PATH")")"

          echo "Writing SSH key..."
          printf '%s\n' "$_KEY" > "$SSH_KEY_PATH"
          echo "Key written: $(wc -c < "$SSH_KEY_PATH") bytes"

          echo "Setting permissions..."
          chmod 600 "$SSH_KEY_PATH"
          echo "Permissions set: $(ls -l "$SSH_KEY_PATH" | awk '{print $1}')"

          echo "Running ssh-keyscan..."
          ssh-keyscan -H "$_HOST" >> "$(dirname "$SSH_KEY_PATH")/known_hosts" 2>/dev/null || echo "::warning::ssh-keyscan failed (non-fatal)"
          echo "known_hosts entries: $(wc -l < "$(dirname "$SSH_KEY_PATH")/known_hosts" 2>/dev/null || echo 0)"

          echo "SSH configured successfully"

      - name: Sync to origin/main
        run: |
          ssh -i "$SSH_KEY_PATH" -o ConnectTimeout=10 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            cd /opt/techvault &&
            git fetch origin &&
            git reset --hard origin/main &&
            chmod +x devops/scripts/*.sh
          '

      - name: Pre-deploy MongoDB backup
        run: |
          ssh -i "$SSH_KEY_PATH" -o ConnectTimeout=10 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            'sudo /opt/techvault/devops/scripts/backup-mongo.sh'

      - name: Build and restart containers
        run: |
          ssh -i "$SSH_KEY_PATH" -o ConnectTimeout=10 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            cd /opt/techvault &&
            docker compose up -d --build
          '

      - name: Wait for containers to stabilize
        run: sleep 15

      - name: Verify deployment
        run: |
          ssh -i "$SSH_KEY_PATH" -o ConnectTimeout=10 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            echo "=== Container status ===" &&
            cd /opt/techvault &&
            docker compose ps &&
            echo "" &&
            echo "=== Health endpoint ===" &&
            curl -sf --max-time 10 http://localhost:5000/api/v1/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)[\"data\"]
          print(\"Status:  \", d[\"status\"])
          print(\"MongoDB: \", d[\"mongodb\"][\"status\"])
          print(\"Version: \", d[\"version\"])
          print(\"Uptime:  \", d[\"uptime\"], \"seconds\")
          if d[\"status\"] != \"healthy\":
              print(\"DEPLOY VERIFICATION FAILED: status is\", d[\"status\"])
              sys.exit(1)
          print(\"Deploy verified: healthy\")
          "
          '

      - name: Post-deploy health check
        run: |
          ssh -i "$SSH_KEY_PATH" -o ConnectTimeout=10 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            'sudo /opt/techvault/devops/scripts/health-check.sh'

      - name: Cleanup SSH key
        if: always()
        run: rm -f "$SSH_KEY_PATH"
