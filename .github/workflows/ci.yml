name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ──────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Frontend build ─────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Docker build validation ────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t techvault-backend:ci .

      - name: Build frontend image
        run: docker build -t techvault-frontend:ci ./client

      - name: Verify backend image starts
        run: |
          docker run -d --name ci-backend \
            -e NODE_ENV=production \
            -e JWT_ACCESS_SECRET=ci-test-access-secret-minimum-32-characters \
            -e JWT_REFRESH_SECRET=ci-test-refresh-secret-minimum-32-characters \
            -e COOKIE_SECRET=ci-test-cookie-secret-minimum-32-characters \
            -e MONGO_URI_PROD=mongodb://localhost:27017/ci \
            techvault-backend:ci
          sleep 3
          docker logs ci-backend
          docker rm -f ci-backend
