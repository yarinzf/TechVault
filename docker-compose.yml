services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - techvault

  # ── Backend (Express + Node.js) ───────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      MONGO_URI_PROD: mongodb://mongodb:27017/techvault
      BACKUP_ROOT: /data/backups/mongodb
      BACKUP_LOG: /data/backups/backup.log
      HEALTH_LOG: /data/logs/health-check.log
      S3_BACKUP_BUCKET: ${S3_BACKUP_BUCKET:-}
    volumes:
      - /opt/techvault/backups:/data/backups:ro
      - /opt/techvault/logs:/data/logs:ro
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - techvault

  # ── Frontend (React/Vite → Nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_STRIPE_PUBLIC_KEY: ${VITE_STRIPE_PUBLIC_KEY:-pk_test_stub}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - techvault

volumes:
  mongodb_data:

networks:
  techvault:
    driver: bridge
